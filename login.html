<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - Volloer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-scratch-blue { background-color: #4d97ff; }
        .text-scratch-blue { color: #4d97ff; }
        .bg-scratch-orange { background-color: #ffab19; }
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-scratch-blue min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-scratch-blue tracking-tighter cursor-pointer" onclick="location.href='index.html'">Volloer</h1>
            <p class="text-gray-400 font-bold mt-2">おかえりなさい！</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-black text-gray-500 mb-2 ml-1">ユーザー名</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-4 top-4 text-gray-300"></i>
                    <input type="text" id="username" required
                        class="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-gray-100 focus:border-scratch-blue focus:outline-none transition font-bold"
                        placeholder="ユーザー名を入力">
                </div>
            </div>

            <div>
                <label class="block text-sm font-black text-gray-500 mb-2 ml-1">パスワード</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-4 text-gray-300"></i>
                    <input type="password" id="password" required
                        class="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-gray-100 focus:border-scratch-blue focus:outline-none transition font-bold"
                        placeholder="パスワードを入力">
                </div>
            </div>

            <button type="submit" id="loginBtn"
                class="w-full bg-scratch-blue hover:brightness-110 text-white font-black py-4 rounded-2xl shadow-lg transition-all transform active:scale-95 text-xl">
                ログインする
            </button>
        </form>

        <p class="text-center mt-6 text-sm font-bold text-gray-400">
            まだアカウントがない？ <a href="signup.html" class="text-scratch-orange hover:underline">新しく作る</a>
        </p>
    </div>

    <script>
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            btn.innerText = 'チェック中...';
            btn.disabled = true;

            try {
                // Supabaseからユーザーを探す
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('username', user)
                    .eq('password', pass)
                    .single(); // 1件だけ取得

                if (error || !data) {
                    throw new Error('ユーザー名かパスワードがちがうよ！');
                }

                // ログイン成功！ ユーザー情報を保存
                localStorage.setItem('v_user', JSON.stringify({
                    username: data.username,
                    id: data.id
                }));

                btn.innerText = '成功！';
                btn.classList.replace('bg-scratch-blue', 'bg-green-500');

                setTimeout(() => {
                    location.href = 'index.html';
                }, 1000);

            } catch (err) {
                alert(err.message);
                btn.innerText = 'ログインする';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
