<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volloer - COLLORFUL-SUNNY GROUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-scratch-blue { background-color: #4d97ff; }
        .text-scratch-blue { color: #4d97ff; }
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        .box-shadow-pop { box-shadow: 0 8px 0 rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-scratch-blue text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-6 py-3">
            <h1 class="text-2xl font-black tracking-tight cursor-pointer" onclick="location.href='../index.html'">Volloer</h1>
            <div class="flex items-center space-x-6 font-bold text-sm">
                <a href="../index.html" class="hover:opacity-80 transition">ホーム</a>
                <a href="../Article/index.html" class="hover:opacity-80 transition">Article</a>
                <a href="../BoX/index.html" class="hover:opacity-80 transition">BoX</a>
            </div>
        </div>
    </nav>

    <header class="bg-scratch-blue text-white py-16 px-6">
        <div class="container mx-auto text-center">
            <h2 class="text-4xl md:text-6xl font-black mb-4 tracking-tighter uppercase">
                COLLORFUL<span class="opacity-70">－</span>SUNNYグループ
            </h2>
            <div class="w-full max-w-2xl h-1 bg-white/30 mx-auto mb-6"></div>
            <p class="text-lg font-bold opacity-90 tracking-wide">次世代クリエイティブ非営利サークル</p>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 max-w-4xl">
        
        <section class="mb-12">
            <h3 class="text-2xl font-black mb-6 border-l-8 border-scratch-blue pl-4">グループ情報</h3>
            <div class="bg-white p-8 rounded-[2rem] border-4 border-gray-100 box-shadow-pop">
                <p class="text-lg font-bold text-gray-600 leading-relaxed">
                    COLLORFUL－SUNNYグループは次世代クリエイティブ非営利サークルです。
                </p>
            </div>
        </section>

        <section class="text-center mb-20">
            <h3 class="text-3xl font-black mb-8 italic tracking-tight text-gray-700 underline decoration-scratch-blue decoration-8 underline-offset-8">お知らせ</h3>
            
            <div class="bg-white p-10 rounded-[3rem] border-4 border-gray-100 box-shadow-pop space-y-6">
                <div onclick="location.href='groupname.html'" class="p-4 border-b-2 border-gray-50 hover:text-scratch-blue transition cursor-pointer">
                    <p class="text-xl font-black">グループ名称変更のお知らせ</p>
                </div>
                <div onclick="location.href='https://volloer.github.io'" class="p-4 border-b-2 border-gray-50 hover:text-scratch-blue transition cursor-pointer">
                    <p class="text-xl font-black">Volloerについて</p>
                </div>
                <div class="p-4 hover:text-scratch-blue transition cursor-pointer">
                    <p class="text-xl font-black">あああ</p>
                </div>

                <div class="pt-6">
                    <button class="bg-orange-500 text-white px-16 py-4 rounded-full font-black text-lg shadow-[0_6px_0_#d35400] hover:translate-y-1 hover:shadow-[0_2px_0_#d35400] transition-all">
                        お知らせ一覧
                    </button>
                </div>
            </div>
        </section>

        <div class="flex flex-col md:flex-row justify-center items-center gap-10 text-gray-400 font-bold text-sm bg-gray-100/50 p-8 rounded-2xl border-2 border-dashed border-gray-200">
            <div class="text-center md:text-left">
                協力：<br>
                Volloer/DEV TEAM
            </div>
            <div class="hidden md:block w-px h-10 bg-gray-200"></div>
            <div class="text-center md:text-right">
                お問い合わせはこちら
            </div>
        </div>

    </main>

    <footer class="py-12 border-t border-gray-100 text-center">
        <p class="text-gray-400 font-black tracking-[0.3em] text-xs uppercase">
            © 2026 Volloer Project
        </p>
    </footer>

</body>
</html>
