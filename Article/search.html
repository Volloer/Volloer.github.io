<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>検索結果 - Volloer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-scratch-blue { background-color: #4d97ff; }
        .text-scratch-blue { color: #4d97ff; }
        .bg-scratch-orange { background-color: #ffab19; }
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-scratch-blue text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-6 py-3">
            <h1 class="text-2xl font-black cursor-pointer shrink-0" onclick="location.href='index.html'">Volloer</h1>
            
            <div class="flex-1 max-w-xl mx-4 md:mx-8 relative">
                <input type="text" id="headerSearchInput" onkeyup="if(event.key==='Enter') executeSearch()"
                    class="w-full px-4 py-2 rounded-full border-none text-gray-700 outline-none font-bold text-sm" 
                    placeholder="再検索...">
            </div>
            
            <div id="auth-area" class="flex items-center gap-3 shrink-0">
                <a href="index.html" class="hover:bg-white/10 px-4 py-2 rounded-full font-bold transition text-sm">戻る</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        <h2 class="text-2xl font-black mb-8">
            「<span id="search-word" class="text-scratch-blue">...</span>」の検索結果
        </h2>

        <div id="search-results" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-gray-400 font-bold">検索中...</div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 共通：有効な絵文字か判定
        function getValidIcon(iconStr) {
            return (iconStr && [...iconStr].length === 1) ? iconStr : '👤';
        }

        async function initSearch() {
            // ログイン情報の同期と表示
            await syncAndRenderAuth();

            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            
            if (!query) {
                location.href = 'index.html';
                return;
            }

            document.getElementById('search-word').innerText = query;
            document.getElementById('headerSearchInput').value = query;

            const { data, error } = await supabaseClient
                .from('posts')
                .select('*')
                .or(`title.ilike.%${query}%,content.ilike.%${query}%`)
                .order('created_at', { ascending: false });

            const resultsArea = document.getElementById('search-results');

            if (error || data.length === 0) {
                resultsArea.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400">見つかりませんでした。別の言葉で試してみて！</div>`;
                return;
            }

            resultsArea.innerHTML = data.map(post => `
                <div onclick="location.href='view.html?id=${post.id}'" 
                     class="bg-white p-6 rounded-3xl border-2 border-gray-100 shadow-sm hover:shadow-xl hover:border-scratch-blue transition-all cursor-pointer group transform hover:-translate-y-1">
                    <h4 class="text-xl font-black mb-2 group-hover:text-scratch-blue transition-colors">${post.title}</h4>
                    <p class="text-gray-500 text-sm line-clamp-3 mb-6 font-medium">${post.content}</p>
                    <div class="flex justify-between items-center text-xs font-bold text-gray-400 border-t border-gray-50 pt-4">
                        <div class="flex items-center gap-2">
                            <div class="w-6 h-6 bg-gray-100 rounded-full flex items-center justify-center text-[10px]">👤</div>
                            <span>By ${post.author}</span>
                        </div>
                        <span class="flex items-center gap-1"><i class="fa-solid fa-thumbs-up text-scratch-orange"></i> ${post.good_count || 0}</span>
                    </div>
                </div>
            `).join('');
        }

        async function syncAndRenderAuth() {
            const authArea = document.getElementById('auth-area');
            const savedUser = localStorage.getItem('v_user');
            
            if (savedUser) {
                let user = JSON.parse(savedUser);
                
                // 最新のアイコンをDBから取得
                const { data } = await supabaseClient
                    .from('users')
                    .select('icon')
                    .eq('username', user.username)
                    .single();
                
                if (data) {
                    user.icon = data.icon;
                    localStorage.setItem('v_user', JSON.stringify(user));
                }

                const displayIcon = getValidIcon(user.icon);
                authArea.innerHTML = `
                    <div class="flex items-center gap-2 bg-white/10 pl-1 pr-3 py-1 rounded-full border border-white/20">
                        <div onclick="location.href='../accounts/dashboard.html'" class="w-8 h-8 bg-white text-scratch-blue rounded-full flex items-center justify-center text-lg cursor-pointer hover:scale-110 transition shadow-sm">
                            ${displayIcon}
                        </div>
                        <span class="font-black text-xs text-white hidden sm:inline">${user.username}</span>
                        <button onclick="logout()" class="text-[10px] text-white/60 hover:text-white font-bold ml-1">ログアウト</button>
                    </div>
                `;
            }
        }

        function executeSearch() {
            const q = document.getElementById('headerSearchInput').value;
            if(q) location.href = `search.html?q=${encodeURIComponent(q)}`;
        }

        function logout() {
            if(confirm('ログアウトしますか？')) {
                localStorage.removeItem('v_user');
                location.reload();
            }
        }

        initSearch();
    </script>
</body>
</html>
