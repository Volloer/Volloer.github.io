<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ページ作成 - Volloer Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap');
        body { font-family: 'Kosugi+Maru', sans-serif; }
        .volloer-card { background: white; border: 4px solid #e0e0e0; border-radius: 1.5rem; }
        .volloer-input { background: #f9f9f9; border: 3px solid #e0e0e0; border-radius: 1rem; }
        .volloer-input:focus { outline: none; border-color: #4d97ff; background: white; }
        .volloer-btn { background: #4d97ff; color: white; border-bottom: 6px solid #3d7acc; border-radius: 1rem; transition: all 0.1s; }
        .volloer-btn:active { transform: translateY(4px); border-bottom-width: 2px; }
        .btn-add { border: 3px dashed #e0e0e0; border-radius: 1rem; color: #aaa; transition: all 0.2s; }
        .btn-add:hover { border-color: #4d97ff; color: #4d97ff; background: #f0f7ff; }
    </style>
</head>
<body class="bg-[#f0f4f9] text-[#575e75] pb-20">
    <nav class="bg-white border-b-4 border-[#e0e0e0] p-4 mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-[#4d97ff] cursor-pointer" onclick="location.href='index.html'">Volloer <span class="text-gray-300 text-lg">Links</span></h1>
        </div>
    </nav>

    <div class="container mx-auto px-6 max-w-2xl">
        <form id="createPageForm" class="space-y-6">
            <section class="volloer-card p-6 shadow-sm space-y-5">
                <h3 class="text-lg font-black text-[#4d97ff]"><i class="fa-solid fa-id-card mr-2"></i>基本情報</h3>
                <div>
                    <label class="block text-sm font-black mb-2">グループの名前</label>
                    <input type="text" name="group_name" placeholder="例: COLLORFUL－SUNNYグループ" class="w-full p-4 volloer-input font-bold" required>
                </div>
                <div>
                    <label class="block text-sm font-black mb-2">グループの肩書き（キャッチコピー）</label>
                    <input type="text" name="tagline" placeholder="例: 次世代クリエイティブ非営利サークル" class="w-full p-4 volloer-input font-bold">
                </div>
                <div>
                    <label class="block text-sm font-black mb-2">カスタムURL</label>
                    <div class="flex items-center volloer-input overflow-hidden">
                        <span class="pl-4 text-gray-400 font-bold text-xs">view.html?group=</span>
                        <input type="text" name="slug" placeholder="my-group" class="w-full p-4 bg-transparent font-bold focus:outline-none" required>
                    </div>
                </div>
            </section>

            <section class="volloer-card p-6 shadow-sm space-y-5">
                <h3 class="text-lg font-black text-orange-500"><i class="fa-solid fa-link mr-2"></i>SNS・公式サイト</h3>
                <div id="linksContainer" class="space-y-4">
                    <div class="link-item grid grid-cols-2 gap-2 p-4 bg-gray-50 rounded-2xl border-2 border-gray-100">
                        <input type="text" placeholder="名前 (例: 公式サイト)" class="p-3 volloer-input text-sm font-bold l-name">
                        <input type="url" placeholder="URL (https://...)" class="p-3 volloer-input text-sm font-bold l-url">
                    </div>
                </div>
                <button type="button" id="addLinkBtn" class="w-full py-3 btn-add font-black text-sm">
                    <i class="fa-solid fa-plus mr-1"></i> リンクを追加する
                </button>
            </section>

            <section class="volloer-card p-6 shadow-sm space-y-5">
                <h3 class="text-lg font-black text-purple-500"><i class="fa-solid fa-palette mr-2"></i>デザイン・紹介</h3>
                <div class="flex items-center gap-4">
                    <label class="text-sm font-black">テーマカラー</label>
                    <input type="color" name="theme_color" value="#4d97ff" class="w-12 h-12 rounded-xl cursor-pointer border-none bg-transparent">
                </div>
                <div>
                    <label class="block text-sm font-black mb-2">グループ紹介文</label>
                    <textarea name="description" rows="4" placeholder="グループの活動内容を詳しく入力してください。" class="w-full p-4 volloer-input font-bold"></textarea>
                </div>
            </section>

            <button type="submit" id="submitBtn" class="volloer-btn px-12 py-5 text-2xl font-black w-full shadow-lg">公開する！</button>
        </form>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // リンク追加ボタン
        document.getElementById('addLinkBtn').addEventListener('click', () => {
            const container = document.getElementById('linksContainer');
            const div = document.createElement('div');
            div.className = "link-item grid grid-cols-2 gap-2 p-4 bg-gray-50 rounded-2xl border-2 border-gray-100";
            div.innerHTML = `
                <input type="text" placeholder="名前" class="p-3 volloer-input text-sm font-bold l-name">
                <input type="url" placeholder="URL" class="p-3 volloer-input text-sm font-bold l-url">
            `;
            container.appendChild(div);
        });

        document.getElementById('createPageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const formData = new FormData(e.target);
            const vUserStr = localStorage.getItem('v_user');
            if (!vUserStr) return alert('ログインし直して！');
            const vUser = JSON.parse(vUserStr);

            // リンク配列作成
            const linksArray = Array.from(document.querySelectorAll('.link-item')).map(item => ({
                label: item.querySelector('.l-name').value,
                url: item.querySelector('.l-url').value
            })).filter(l => l.label && l.url);

            btn.disabled = true;
            btn.innerText = "作成中...";

            const { error } = await supabase.from('pages').insert([{
                user_id: vUser.id,
                group_name: formData.get('group_name'),
                tagline: formData.get('tagline'), // 肩書き追加
                slug: formData.get('slug'),
                links: linksArray,
                theme_color: formData.get('theme_color'),
                description: formData.get('description')
            }]);

            if (!error) location.href = `view.html?group=${formData.get('slug')}`;
            else { alert(error.message); btn.disabled = false; }
        });
    </script>
</body>
</html>
