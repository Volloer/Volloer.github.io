<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン診断 - Volloer Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap');
        body { font-family: 'Kosugi+Maru', sans-serif; background: #f0f4f9; padding: 20px; }
        .debug-box { background: white; border: 4px solid #e0e0e0; border-radius: 1rem; padding: 20px; max-width: 500px; margin: auto; }
    </style>
</head>
<body>
    <div class="debug-box">
        <h1 class="text-xl font-black mb-4 text-[#4d97ff]">ログイン診断中...</h1>
        <div id="log" class="text-sm font-bold space-y-2 text-gray-600">
            <p>🔍 Supabaseに接続中...</p>
        </div>
        <hr class="my-4">
        <button onclick="location.reload()" class="w-full py-2 bg-gray-100 rounded-lg font-bold">再読み込み</button>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        
        const log = document.getElementById('log');
        function addLog(msg, color = "text-gray-600") {
            log.innerHTML += `<p class="${color}">${msg}</p>`;
        }

        try {
            const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
                auth: { persistSession: true }
            });

            // 1. セッションチェック
            const { data: { session }, error: sError } = await supabase.auth.getSession();
            
            if (session) {
                addLog(`✅ セッション発見！`, "text-green-500");
                addLog(`👤 User ID: ${session.user.id}`);
                addLog(`📧 Email: ${session.user.email}`);
            } else {
                addLog(`❌ セッションが空です (null)`, "text-red-500");
                addLog(`💡 ログインページでもう一度ログインしてみて。`);
            }

            // 2. ローカルストレージの中身を確認
            const storageKey = `sb-${new URL(SUPABASE_URL).hostname.split('.')[0]}-auth-token`;
            const hasToken = localStorage.getItem(storageKey);
            if (hasToken) {
                addLog(`📦 LocalStorageにトークンを発見。`, "text-blue-500");
            } else {
                addLog(`📦 LocalStorageにトークンがありません。`, "text-red-400");
            }

        } catch (e) {
            addLog(`💥 重大なエラー: ${e.message}`, "text-red-600");
        }
    </script>
</body>
</html>
