<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volloer Links - コミュニティを、もっと身近に。</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-scratch-blue { background-color: #4d97ff; }
        .text-scratch-blue { color: #4d97ff; }
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        .box-shadow-pop { box-shadow: 0 8px 0 rgba(0,0,0,0.1); }
        .hero-pattern {
            background-color: #4d97ff;
            background-image: radial-gradient(rgba(255, 255, 255, 0.2) 2px, transparent 2px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white border-b-4 border-gray-100 sticky top-0 z-50 px-6 py-3">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-scratch-blue tracking-tight cursor-pointer" onclick="location.href='../index.html'">
                Volloer <span class="text-gray-400">Links</span>
            </h1>
            <div class="flex items-center space-x-4">
                <a href="../index.html" class="text-sm font-bold text-gray-400 hover:text-scratch-blue transition">Volloer Home</a>
            </div>
        </div>
    </nav>

    <header class="hero-pattern text-white py-24 px-6 text-center">
        <div class="container mx-auto">
            <div class="inline-block bg-orange-500 text-white px-6 py-1 rounded-full text-xs font-black mb-6 shadow-lg">NEW SERVICE</div>
            <h2 class="text-4xl md:text-6xl font-black mb-6 tracking-tighter">
                コミュニティの「今」を、<br>もっと身近に。
            </h2>
            <p class="text-lg font-bold opacity-90 max-w-2xl mx-auto mb-10 leading-relaxed">
                Volloer Linksは、グループやコミュニティ、企業のための<br class="hidden md:inline">
                特設ページ作成サービスです。
            </p>
            <button class="bg-white text-scratch-blue px-12 py-4 rounded-full font-black text-xl shadow-[0_6px_0_#cbdcf7] hover:translate-y-1 hover:shadow-[0_2px_0_#cbdcf7] transition-all">
                ページを作成する
            </button>
        </div>
    </header>

    <main class="container mx-auto px-6 py-20 max-w-4xl">
        <section class="bg-white p-12 rounded-[3rem] border-4 border-gray-100 box-shadow-pop relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-10">
                <i class="fa-solid fa-link text-9xl"></i>
            </div>
            
            <h3 class="text-2xl font-black mb-8 border-l-8 border-scratch-blue pl-4">Linksでできること</h3>
            
            <div class="grid md:grid-cols-2 gap-10 font-bold text-gray-600">
                <div class="space-y-3">
                    <p class="text-scratch-blue text-lg"><i class="fa-solid fa-check-circle mr-2"></i> かんたん作成</p>
                    <p class="text-sm leading-relaxed text-gray-400">
                        プログラミングの知識は不要。必要な情報を入力するだけで、Volloer標準のポップなページが手に入ります。
                    </p>
                </div>
                <div class="space-y-3">
                    <p class="text-scratch-blue text-lg"><i class="fa-solid fa-check-circle mr-2"></i> グループの信頼性向上</p>
                    <p class="text-sm leading-relaxed text-gray-400">
                        Volloerのドメイン・デザインを使用することで、あなたの活動の公式感を高めます。
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center">
        <p class="text-gray-300 font-black tracking-[0.3em] text-[10px] uppercase">
            © 2026 Volloer Project / Links Team
        </p>
    </footer>

</body>
</html>
