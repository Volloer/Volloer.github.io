<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volloer Links - コミュニティを、もっと身近に。</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap');
        
        body { font-family: 'Kosugi+Maru', "Helvetica Neue", Arial, sans-serif; }
        .bg-scratch-blue { background-color: #4d97ff; }
        .text-scratch-blue { color: #4d97ff; }
        .box-shadow-pop { box-shadow: 0 8px 0 rgba(0,0,0,0.05); }
        
        .hero-pattern {
            background-color: #4d97ff;
            background-image: radial-gradient(rgba(255, 255, 255, 0.2) 2px, transparent 2px);
            background-size: 30px 30px;
        }

        .volloer-btn-white {
            background: white;
            color: #4d97ff;
            border-bottom: 6px solid #cbdcf7;
            border-radius: 9999px;
            transition: all 0.1s;
            display: inline-block;
        }
        
        .volloer-btn-white:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white border-b-4 border-gray-100 sticky top-0 z-50 px-6 py-3">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-scratch-blue tracking-tight cursor-pointer" onclick="location.href='index.html'">
                Volloer <span class="text-gray-400">Links</span>
            </h1>
            <div class="flex items-center space-x-4">
                <a href="../index.html" class="text-sm font-bold text-gray-400 hover:text-scratch-blue transition">Volloer Home</a>
            </div>
        </div>
    </nav>

    <header class="hero-pattern text-white py-24 px-6 text-center">
        <div class="container mx-auto">
            <div class="inline-block bg-orange-500 text-white px-6 py-1 rounded-full text-xs font-black mb-6 shadow-lg uppercase tracking-wider">New Service</div>
            <h2 class="text-4xl md:text-6xl font-black mb-6 tracking-tighter">
                コミュニティの「今」を、<br>もっと身近に。
            </h2>
            <p class="text-lg font-bold opacity-90 max-w-2xl mx-auto mb-10 leading-relaxed">
                Volloer Linksは、グループやコミュニティのための<br class="hidden md:inline">
                特設ページ作成サービスです。
            </p>
            
            <button onclick="location.href='createpage.html'" class="volloer-btn-white px-12 py-4 font-black text-xl shadow-lg">
                ページを作成する
            </button>
        </div>
    </header>

    <main class="container mx-auto px-6 py-20 max-w-4xl">
        <section class="bg-white p-12 rounded-[3rem] border-4 border-gray-100 box-shadow-pop relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-5">
                <i class="fa-solid fa-link text-9xl"></i>
            </div>
            
            <h3 class="text-2xl font-black mb-8 border-l-8 border-scratch-blue pl-4">Linksでできること</h3>
            
            <div class="grid md:grid-cols-2 gap-10 font-bold text-gray-600">
                <div class="space-y-3">
                    <p class="text-scratch-blue text-lg flex items-center">
                        <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> かんたん作成
                    </p>
                    <p class="text-sm leading-relaxed text-gray-400">
                        プログラミング不要。必要な情報を入力するだけで、Volloer標準のポップなページがすぐに手に入ります。
                    </p>
                </div>
                <div class="space-y-3">
                    <p class="text-scratch-blue text-lg flex items-center">
                        <i class="fa-solid fa-shield-heart mr-2"></i> 公式感アップ
                    </p>
                    <p class="text-sm leading-relaxed text-gray-400">
                        Volloerのデザインをそのまま使うことで、あなたのグループや活動の信頼性を高めることができます。
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center">
        <p class="text-gray-300 font-black tracking-[0.3em] text-[10px] uppercase">
            © 2026 Volloer Project / Links Team
        </p>
    </footer>

</body>
</html>
