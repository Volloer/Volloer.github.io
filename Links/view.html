<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>読み込み中... - Volloer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap');
        :root { --theme-color: #4d97ff; }
        .bg-scratch-blue { background-color: var(--theme-color); }
        .text-scratch-blue { color: var(--theme-color); }
        .border-scratch-blue { border-color: var(--theme-color); }
        .decoration-scratch-blue { text-decoration-color: var(--theme-color); }
        
        body { font-family: "Helvetica Neue", Helvetica, Arial, "Kosugi Maru", sans-serif; }
        .box-shadow-pop { box-shadow: 0 8px 0 rgba(0,0,0,0.05); }
        .loading-screen { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="loading" class="loading-screen">
        <div class="text-xl font-black text-gray-400 animate-pulse">読み込み中...</div>
    </div>

    <nav class="bg-scratch-blue text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-6 py-3">
            <h1 class="text-2xl font-black tracking-tight cursor-pointer" onclick="location.href='index.html'">Volloer</h1>
            <div class="flex items-center space-x-6 font-bold text-sm">
                <a href="index.html" class="hover:opacity-80 transition">ホーム</a>
                <a href="#" class="hover:opacity-80 transition">Article</a>
                <a href="#" class="hover:opacity-80 transition">BoX</a>
            </div>
        </div>
    </nav>

    <header class="bg-scratch-blue text-white py-16 px-6">
        <div class="container mx-auto text-center">
            <h2 id="disp_group_name" class="text-4xl md:text-6xl font-black mb-4 tracking-tighter uppercase">---</h2>
            <div class="w-full max-w-2xl h-1 bg-white/30 mx-auto mb-6"></div>
            <p id="disp_tagline" class="text-lg md:text-xl font-bold opacity-90 tracking-wide">---</p>
        </div>
    </header>

    <main id="content" class="container mx-auto px-6 py-12 max-w-4xl opacity-0 transition-opacity duration-500">
        
        <section class="mb-12">
            <h3 class="text-2xl font-black mb-6 border-l-8 border-scratch-blue pl-4">グループ情報</h3>
            <div class="bg-white p-8 rounded-[2rem] border-4 border-gray-100 box-shadow-pop">
                <p id="disp_description" class="text-lg font-bold text-gray-600 leading-relaxed whitespace-pre-wrap">
                    読み込み中...
                </p>
            </div>
        </section>

        <section class="text-center mb-20">
            <h3 class="text-3xl font-black mb-8 italic tracking-tight text-gray-700 underline decoration-scratch-blue decoration-8 underline-offset-8">公式リンク</h3>
            <div id="links_area" class="bg-white p-6 md:p-10 rounded-[3rem] border-4 border-gray-100 box-shadow-pop divide-y-2 divide-gray-50">
                </div>
        </section>

        <div class="text-center text-gray-400 font-bold text-sm p-8 border-t border-gray-100 mt-20">
            協力：Volloer/DEV TEAM
        </div>

    </main>

    <footer class="py-12 text-center">
        <p class="text-gray-400 font-black tracking-[0.3em] text-xs uppercase">
            © 2026 Volloer Project
        </p>
    </footer>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // 安全にテキストを挿入する関数 (XSS対策)
        const setText = (id, text) => {
            const el = document.getElementById(id);
            if (el) el.textContent = text;
        };

        async function loadPage() {
            const slug = new URLSearchParams(window.location.search).get('group');
            if (!slug) return;

            const { data, error } = await supabase.from('pages').select('*').eq('slug', slug).maybeSingle();
            
            if (error || !data) {
                document.getElementById('loading').textContent = "ページが見つかりません。";
                return;
            }

            // タイトルと基本情報の反映
            document.title = `${data.group_name} - Volloer`;
            setText('disp_group_name', data.group_name);
            setText('disp_tagline', data.tagline || ""); // 肩書きをセット
            setText('disp_description', data.description || "紹介文はありません。");
            
            // テーマカラー反映
            const themeColor = data.theme_color || '#4d97ff';
            document.documentElement.style.setProperty('--theme-color', themeColor);

            const area = document.getElementById('links_area');
            area.innerHTML = '';

            // リンクの生成
            if (data.links && Array.isArray(data.links) && data.links.length > 0) {
                data.links.forEach(l => {
                    if (l.label && l.url) {
                        const row = document.createElement('div');
                        row.className = "p-5 hover:text-scratch-blue transition cursor-pointer group";
                        
                        const p = document.createElement('p');
                        p.className = "text-xl font-black";
                        p.textContent = l.label;
                        
                        row.appendChild(p);
                        row.onclick = () => {
                            const cleanUrl = l.url.startsWith('http') ? l.url : `https://${l.url}`;
                            window.open(cleanUrl, '_blank');
                        };
                        area.appendChild(row);
                    }
                });
            } else {
                area.innerHTML = '<p class="text-gray-400 font-bold p-5">公開されているリンクはありません。</p>';
            }

            // フェードイン表示
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('opacity-0');
            }, 500);
        }

        loadPage();
    </script>
</body>
</html>
