<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>読み込み中... - Volloer Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap');
        body { font-family: 'Kosugi+Maru', sans-serif; }
        
        .volloer-card {
            background: white;
            border: 4px solid #e0e0e0;
            border-radius: 2rem;
        }
        
        :root { --theme-color: #4d97ff; }
        .bg-theme { background-color: var(--theme-color); }
        .text-theme { color: var(--theme-color); }
        .border-theme { border-color: var(--theme-color); }

        /* スケルトンアニメーション */
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-[#f0f4f9] text-[#575e75] min-h-screen">

    <nav class="bg-white border-b-4 border-[#e0e0e0] p-4 mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-theme cursor-pointer" onclick="location.href='index.html'">
                Volloer <span class="text-gray-300">Links</span>
            </h1>
            <button onclick="location.href='index.html'" class="text-sm font-bold text-gray-400">ホームへ</button>
        </div>
    </nav>

    <div id="loading" class="text-center py-20">
        <div class="animate-spin inline-block w-12 h-12 border-4 border-theme border-t-transparent rounded-full mb-4"></div>
        <p class="font-bold text-gray-400">ページをさがしています...</p>
    </div>

    <div id="content" class="container mx-auto px-6 max-w-2xl hidden">
        <div class="volloer-card p-8 shadow-sm text-center">
            <div id="profile_icon" class="w-24 h-24 bg-theme rounded-3xl mx-auto mb-6 shadow-lg flex items-center justify-center text-white text-4xl">
                <i class="fa-solid fa-users"></i>
            </div>
            
            <h2 id="group_name" class="text-3xl font-black mb-4">---</h2>
            
            <div id="description" class="bg-gray-50 p-6 rounded-2xl font-bold text-left mb-8 border-2 border-dashed border-gray-200 leading-relaxed whitespace-pre-wrap">
                ...
            </div>

            <div class="space-y-4">
                <button class="w-full py-4 bg-white border-4 border-[#e0e0e0] rounded-2xl font-black hover:border-theme transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-globe text-theme"></i> 公式サイト
                </button>
                <button class="w-full py-4 bg-white border-4 border-[#e0e0e0] rounded-2xl font-black hover:border-theme transition-all flex items-center justify-center gap-2">
                    <i class="fa-brands fa-x-twitter text-theme"></i> 公式X (Twitter)
                </button>
            </div>
        </div>

        <footer class="mt-12 text-center pb-10">
            <p class="text-xs font-black text-gray-300 tracking-widest uppercase">Created by Volloer Links</p>
        </footer>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadPage() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('group'); 

            if (!slug) {
                document.getElementById('loading').innerHTML = `
                    <div class="py-10">
                        <i class="fa-solid fa-circle-exclamation text-red-400 text-5xl mb-4"></i>
                        <p class="text-red-400 font-bold text-xl">URLが正しくありません。</p>
                        <a href="index.html" class="inline-block mt-4 text-theme font-bold">ホームに戻る</a>
                    </div>
                `;
                return;
            }

            const { data, error } = await supabase
                .from('pages')
                .select('*')
                .eq('slug', slug)
                .single();

            if (error || !data) {
                document.getElementById('loading').innerHTML = `
                    <div class="py-10">
                        <i class="fa-solid fa-ghost text-gray-300 text-5xl mb-4"></i>
                        <p class="text-gray-400 font-bold text-xl">ページが見つかりませんでした。</p>
                        <a href="index.html" class="inline-block mt-4 text-theme font-bold">ホームに戻る</a>
                    </div>
                `;
                return;
            }

            // --- データの反映 ---
            document.title = `${data.group_name} - Volloer Links`;
            document.getElementById('group_name').innerText = data.group_name;
            document.getElementById('description').innerText = data.description || "紹介文はありません。";
            
            // テーマカラーの反映
            if (data.theme_color) {
                document.documentElement.style.setProperty('--theme-color', data.theme_color);
            }

            // 表示の切り替え
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
        }

        loadPage();
    </script>
</body>
</html>
