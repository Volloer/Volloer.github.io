<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>読み込み中 - Volloer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-scratch-blue { background-color: #4d97ff; }
        .text-scratch-blue { color: #4d97ff; }
        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #4d97ff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-sm rounded-3xl shadow-xl p-10 text-center">
        <div class="flex justify-center mb-6">
            <div class="loader"></div>
        </div>
        
        <h2 id="statusText" class="text-2xl font-black text-gray-700 mb-2">読み込み中...</h2>
        <p id="subText" class="text-gray-400 font-bold">アカウントを作成しています</p>
    </div>

    <script>
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function processSignup() {
            const statusText = document.getElementById('statusText');
            const subText = document.getElementById('subText');

            try {
                // --- 変更点：URLからではなく、一時メモリ(sessionStorage)からデータを取る ---
                const savedData = sessionStorage.getItem('pendingUser');
                
                if (!savedData) {
                    throw new Error('登録データが見つかりませんでした。もう一度やり直してね。');
                }

                // JSONをオブジェクトに戻す
                const { username, password } = JSON.parse(savedData);

                // Supabaseに登録
                const { error } = await supabaseClient
                    .from('users')
                    .insert([{ username: username, password: password }]);

                if (error) {
                    if (error.code === '23505') {
                        throw new Error('そのユーザー名はすでに使われています。');
                    }
                    throw error;
                }

                // 成功したらメモリを消去（お掃除）
                sessionStorage.removeItem('pendingUser');

                statusText.innerText = '認証成功！';
                statusText.classList.add('text-green-500');
                subText.innerText = 'Volloerへようこそ！';

                setTimeout(() => {
                    location.href = 'index.html';
                }, 1500);

            } catch (err) {
                statusText.innerText = 'おっと！';
                statusText.classList.add('text-red-500');
                subText.innerText = err.message;
                
                setTimeout(() => {
                    location.href = 'signup.html';
                }, 3000);
            }
        }

        processSignup();
    </script>
</body>
</html>
