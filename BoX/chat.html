<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Volloer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-volloer-orange { background-color: #ffab19; }
        .text-volloer-orange { color: #ffab19; }
        .bg-scratch-blue { background-color: #4d97ff; }
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-thumb { background: #eee; border-radius: 10px; }

        .v-toast {
            animation: toast-in 0.3s ease-out forwards;
            pointer-events: auto;
        }
        @keyframes toast-in {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .v-toast.fade-out {
            animation: toast-out 0.3s ease-in forwards;
        }
        @keyframes toast-out {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-20px); opacity: 0; }
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <div id="toast-container" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <nav class="bg-white border-b p-4 flex items-center justify-between shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <button onclick="location.href='index.html'" class="text-gray-400 hover:text-volloer-orange transition">
                <i class="fa-solid fa-chevron-left text-xl"></i>
            </button>
            <div id="box-info" class="flex items-center gap-3">
                <div id="box-icon" class="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center text-2xl">💬</div>
                <div>
                    <h1 id="box-title" class="font-black text-lg leading-tight">読み込み中...</h1>
                    <p id="box-desc" class="text-[10px] text-gray-400 font-bold truncate max-w-[200px]">...</p>
                </div>
            </div>
        </div>
        
        <div onclick="location.href='../accounts/dashboard.html'" id="my-icon" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-xl shadow-sm border border-gray-100 cursor-pointer hover:scale-110 transition">
            👤
        </div>
    </nav>

    <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

    <div class="bg-white p-4 border-t shadow-lg">
        <div class="container mx-auto max-w-4xl flex gap-3">
            <input type="text" id="msg-input" placeholder="メッセージを入力..." 
                class="flex-1 bg-gray-50 border-2 border-gray-100 rounded-2xl px-6 py-3 outline-none focus:border-volloer-orange font-bold transition">
            <button onclick="sendMessage()" class="bg-volloer-orange text-white w-12 h-12 rounded-2xl flex items-center justify-center hover:scale-105 active:scale-95 transition shadow-md">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const params = new URLSearchParams(window.location.search);
        const boxId = params.get('id');
        let user = JSON.parse(localStorage.getItem('v_user'));

        if (!boxId) location.href = 'index.html';

        function showMessage(text, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style.backgroundColor = type === 'success' ? '#4d97ff' : '#ff4d4d';
            toast.className = `text-white px-8 py-3 rounded-full font-black shadow-2xl flex items-center gap-3 v-toast min-w-[280px] justify-center`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check' : 'fa-circle-exclamation'}"></i><span>${text}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function getValidIcon(iconStr) {
            return (iconStr && [...iconStr].length === 1) ? iconStr : '👤';
        }

        function linkify(text) {
            const urlPattern = /(https?:\/\/[\w\.\-\?=\+&%#~!]+)/gi;
            return text.replace(urlPattern, '<a href="$1" target="_blank" rel="noopener noreferrer" class="text-blue-500 underline hover:no-underline break-all">$1</a>');
        }

        // --- メンションハイライト関数 ---
        function highlightMention(text) {
            // 他人へのメンション（一般的なハイライト）
            const generalMention = /(@[a-zA-Z0-9_ぁ-んァ-ヶー一-龠]+)/g;
            let processed = text.replace(generalMention, '<span class="text-blue-400 font-bold">$1</span>');
            
            // 自分宛のメンション（設定がONの場合のみ、さらに目立たせる）
            if (user && user.username && user.mention_accepted !== false) {
                const myMentionPattern = new RegExp(`(@${user.username})`, 'g');
                processed = processed.replace(myMentionPattern, '<span class="bg-yellow-200 text-yellow-900 px-1 rounded-md font-black ring-1 ring-yellow-400">$1</span>');
            }
            return processed;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (user) {
                document.getElementById('my-icon').innerText = getValidIcon(user.icon);
                // アイコンと一緒にメンション設定も取得
                const { data } = await supabaseClient.from('users').select('icon, mention_accepted').eq('username', user.username).single();
                if (data) {
                    user.icon = data.icon;
                    user.mention_accepted = data.mention_accepted;
                    localStorage.setItem('v_user', JSON.stringify(user));
                    document.getElementById('my-icon').innerText = getValidIcon(user.icon);
                }
            }
            loadBoxInfo();
            loadMessages();
            subscribeMessages();
            document.getElementById('msg-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        });

        async function loadBoxInfo() {
            const { data } = await supabaseClient.from('boxes').select('*').eq('id', boxId).single();
            if (data) {
                document.getElementById('box-title').innerText = data.title;
                document.getElementById('box-desc').innerText = data.description || '紹介文はありません';
                document.getElementById('box-icon').innerText = data.icon_type || '💬';
            }
        }

        async function loadMessages() {
            const { data } = await supabaseClient.from('messages').select('*').eq('box_id', boxId).order('created_at', { ascending: true });
            if (data) {
                data.forEach(msg => appendMessage(msg));
                scrollToBottom();
            }
        }

        function subscribeMessages() {
            supabaseClient.channel(`box-${boxId}`).on('postgres_changes', { 
                event: 'INSERT', schema: 'public', table: 'messages', filter: `box_id=eq.${boxId}` 
            }, payload => {
                appendMessage(payload.new);
                scrollToBottom();
            }).subscribe();
        }

        function appendMessage(msg) {
            const container = document.getElementById('chat-container');
            const isMe = user && msg.username === user.username;
            const displayIcon = getValidIcon(msg.sender_icon);

            // 1. エスケープ 2. URL化 3. メンション化 の順に処理
            let contentHTML = escapeHTML(msg.content);
            contentHTML = linkify(contentHTML);
            contentHTML = highlightMention(contentHTML);

            const div = document.createElement('div');
            div.className = `flex items-end gap-2 mb-4 ${isMe ? 'flex-row-reverse' : 'flex-row'}`;
            div.innerHTML = `
                <div class="w-8 h-8 flex-shrink-0 bg-white rounded-full flex items-center justify-center text-lg shadow-sm border border-gray-100">
                    ${displayIcon}
                </div>
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[75%]">
                    ${!isMe ? `<p class="text-[10px] font-black text-gray-400 mb-1 ml-1">${msg.username}</p>` : ''}
                    <div class="${isMe ? 'bg-volloer-orange text-white rounded-l-2xl rounded-tr-2xl' : 'bg-white text-gray-800 rounded-r-2xl rounded-tl-2xl border border-gray-100'} px-4 py-2 shadow-sm">
                        <p class="font-bold text-sm leading-relaxed whitespace-pre-wrap">${contentHTML}</p>
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const content = input.value.trim();
            if (!user) { showMessage("ログインしないと送れないよ！", "error"); return; }
            if (!content) return;
            const temp = content;
            input.value = '';
            const { error } = await supabaseClient.from('messages').insert([{
                box_id: boxId,
                username: user.username,
                sender_icon: getValidIcon(user.icon), 
                content: temp
            }]);
            if (error) { showMessage("送信に失敗しちゃった...", "error"); input.value = temp; }
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        function escapeHTML(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }
    </script>
</body>
</html>
