<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新しいBoXを作る - Volloer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-volloer-orange { background-color: #ffab19; }
        .text-volloer-orange { color: #ffab19; }
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        .icon-option { transition: all 0.2s ease; }
        .icon-option:hover { transform: scale(1.1); }
        .icon-selected { border: 4px solid #ffab19 !important; background-color: #fff9f0 !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-volloer-orange text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex items-center">
            <button onclick="location.href='index.html'" class="mr-4 hover:bg-black/10 p-2 rounded-full transition">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </button>
            <h1 class="text-xl font-black italic tracking-tighter">Create new BoX</h1>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-12 max-w-2xl">
        <div class="bg-white rounded-[3rem] shadow-xl p-8 md:p-12 border border-gray-100">
            <div class="text-center mb-10">
                <div id="icon-preview" class="w-24 h-24 bg-orange-50 rounded-[2rem] flex items-center justify-center text-5xl mx-auto mb-4 text-volloer-orange shadow-inner border-2 border-orange-100">💬</div>
                <h2 class="text-2xl font-black text-gray-800">新しいコミュニティを立ち上げよう</h2>
                <p class="text-gray-400 font-bold text-sm">アイコン、名前、紹介文を決めてスタート！</p>
            </div>

            <div class="space-y-10">
                <div>
                    <label class="block text-gray-700 font-black mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-icons text-volloer-orange"></i> アイコンを選択
                    </label>
                    <div id="icon-selector" class="grid grid-cols-5 gap-4">
                        <button onclick="selectIcon('💬', this)" class="icon-option p-4 bg-gray-50 rounded-2xl text-2xl border-2 border-transparent icon-selected">💬</button>
                        <button onclick="selectIcon('🎮', this)" class="icon-option p-4 bg-gray-50 rounded-2xl text-2xl border-2 border-transparent">🎮</button>
                        <button onclick="selectIcon('🎨', this)" class="icon-option p-4 bg-gray-50 rounded-2xl text-2xl border-2 border-transparent">🎨</button>
                        <button onclick="selectIcon('💻', this)" class="icon-option p-4 bg-gray-50 rounded-2xl text-2xl border-2 border-transparent">💻</button>
                        <button onclick="selectIcon('📢', this)" class="icon-option p-4 bg-gray-50 rounded-2xl text-2xl border-2 border-transparent">📢</button>
                    </div>
                </div>

                <div>
                    <label for="box-title" class="block text-gray-700 font-black mb-2 flex items-center gap-2">
                        <i class="fa-solid fa-quote-left text-volloer-orange"></i> BoXの名前
                    </label>
                    <input type="text" id="box-title" maxlength="20" placeholder="例：ゲーム制作部" 
                        class="w-full px-6 py-4 rounded-2xl border-2 border-gray-100 outline-none focus:border-volloer-orange font-bold transition-all text-lg shadow-sm">
                </div>

                <div>
                    <label for="box-desc" class="block text-gray-700 font-black mb-2 flex items-center gap-2">
                        <i class="fa-solid fa-align-left text-volloer-orange"></i> 紹介文（100文字以内）
                    </label>
                    <textarea id="box-desc" rows="4" maxlength="100" placeholder="どんなことを話す場所ですか？" 
                        class="w-full px-6 py-4 rounded-2xl border-2 border-gray-100 outline-none focus:border-volloer-orange font-bold transition-all shadow-sm"></textarea>
                </div>

                <div class="pt-4">
                    <button onclick="publishBox()" id="publish-btn" 
                        class="w-full bg-volloer-orange text-white py-5 rounded-[1.5rem] font-black text-xl shadow-lg hover:brightness-105 active:scale-95 transition-all flex items-center justify-center gap-3">
                        <i class="fa-solid fa-paper-plane"></i> BoXを公開する
                    </button>
                    <p class="text-center text-gray-300 text-[10px] mt-4 font-bold uppercase tracking-widest">Powered by Volloer Engine</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentIcon = '💬';

        function selectIcon(icon, el) {
            currentIcon = icon;
            document.getElementById('icon-preview').innerText = icon;
            document.querySelectorAll('#icon-selector button').forEach(btn => btn.classList.remove('icon-selected'));
            el.classList.add('icon-selected');
        }

        async function publishBox() {
            const userStr = localStorage.getItem('v_user');
            if (!userStr) return alert("ログインしてくれ！");
            
            const user = JSON.parse(userStr);
            const title = document.getElementById('box-title').value.trim();
            const desc = document.getElementById('box-desc').value.trim();
            const btn = document.getElementById('publish-btn');

            if (!title) return alert("名前を入力してくれ！");

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> 作成中...';

            const { error } = await supabaseClient.from('boxes').insert([{
                title: title,
                description: desc,
                icon_type: currentIcon,
                created_by: user.username,
                is_active: true
            }]);

            if (error) {
                alert("作成エラー: " + error.message);
                btn.disabled = false;
                btn.innerText = 'BoXを公開する';
            } else {
                location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
