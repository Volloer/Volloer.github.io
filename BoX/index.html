<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoX - Volloer Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-volloer-orange { background-color: #ffab19; }
        .text-volloer-orange { color: #ffab19; }
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        .box-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid #eee;
        }
        .box-card:hover {
            transform: scale(1.02);
            border-color: #ffab19;
            box-shadow: 0 15px 30px -10px rgba(255, 171, 25, 0.3);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-volloer-orange text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-6 py-3">
            <div class="flex items-center space-x-8">
                <h1 class="text-2xl font-black cursor-pointer" onclick="location.href='../index.html'">Volloer</h1>
                <div class="flex space-x-6 font-bold">
                    <a href="../index.html" class="hover:opacity-80 transition text-sm">ホーム</a>
                    <a href="../Article/index.html" class="hover:opacity-80 transition text-sm">Article</a>
                </div>
            </div>
            <div id="nav-auth" class="flex items-center space-x-4"></div>
        </div>
    </nav>

    <header class="bg-volloer-orange text-white py-16 px-6">
        <div class="container mx-auto text-center">
            <div class="inline-block bg-white/20 p-4 rounded-3xl mb-6 shadow-inner">
                <i class="fa-solid fa-comments text-6xl"></i>
            </div>
            <h2 class="text-5xl font-black mb-4 tracking-tighter italic">BoX</h2>
            <p class="text-xl font-bold opacity-90">仲間と繋がり、リアルタイムに語り合おう。</p>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <h3 class="text-3xl font-black text-gray-700 italic">Find your Community</h3>
            <div class="relative w-full md:w-96">
                <input type="text" id="boxSearch" onkeyup="searchBoxes()" class="w-full px-6 py-3 rounded-full border-2 border-gray-200 focus:border-volloer-orange outline-none font-bold transition shadow-sm" placeholder="BoXを探す...">
                <i class="fa-solid fa-magnifying-glass absolute right-5 top-4 text-gray-300"></i>
            </div>
        </div>

        <div id="box-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div onclick="goToCreate()" class="border-4 border-dashed border-gray-200 rounded-[2.5rem] flex flex-col items-center justify-center p-8 hover:bg-orange-50 hover:border-volloer-orange transition-all cursor-pointer text-gray-300 hover:text-volloer-orange h-72">
                <i class="fa-solid fa-plus-circle text-5xl mb-4"></i>
                <span class="font-black text-xl">新しいBoXを作る</span>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.addEventListener('DOMContentLoaded', async () => {
            setupAuth(); 
            
            const user = JSON.parse(localStorage.getItem('v_user'));
            if (user) {
                const { data } = await supabaseClient
                    .from('users')
                    .select('icon')
                    .eq('username', user.username)
                    .single();
                
                if (data) {
                    user.icon = data.icon;
                    localStorage.setItem('v_user', JSON.stringify(user));
                    setupAuth();
                }
            }
            fetchBoxes();
        });

        function setupAuth() {
            const navAuth = document.getElementById('nav-auth');
            const user = JSON.parse(localStorage.getItem('v_user'));
            
            if (user) {
                let displayIcon = '👤';
                if (user.icon && [...user.icon].length === 1) {
                    displayIcon = user.icon;
                }

                navAuth.innerHTML = `
                    <div class="flex items-center gap-3 bg-white/20 pl-1 pr-3 py-1 rounded-full border border-white/20 shadow-inner">
                        <div onclick="location.href='../accounts/dashboard.html'" class="w-8 h-8 bg-white text-volloer-orange rounded-full flex items-center justify-center text-lg cursor-pointer hover:scale-110 transition shadow-sm">
                            ${displayIcon}
                        </div>
                        <span class="font-black text-white text-sm hidden sm:inline">${user.username}</span>
                        <button onclick="logout()" class="text-[10px] text-white/60 hover:text-white font-bold ml-2">ログアウト</button>
                    </div>
                `;
            } else {
                navAuth.innerHTML = `<a href="../accounts/login.html" class="font-bold text-sm bg-white text-volloer-orange px-4 py-2 rounded-full shadow-sm hover:scale-105 transition">ログイン</a>`;
            }
        }

async function fetchBoxes() {
            const listArea = document.getElementById('box-list');
            
            // 修正：もしupdated_atがないとエラーになるので、まずはcreated_atで確実に取得する
            // 活動順を有効にしたい場合は、下の行を .order('updated_at', { ascending: false }) に戻す
            const { data, error } = await supabaseClient
                .from('boxes')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("データ取得エラー:", error);
                return;
            }

            const createBtnHtml = listArea.children[0].outerHTML;
            listArea.innerHTML = createBtnHtml + data.map(box => `
                <div onclick="location.href='chat.html?id=${box.id}'" class="box-card bg-white p-8 rounded-[2.5rem] cursor-pointer group flex flex-col h-72 shadow-sm">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-16 h-16 bg-orange-100 rounded-2xl flex items-center justify-center text-volloer-orange text-3xl">
                            ${box.icon_type || '💬'}
                        </div>
                        <span class="bg-green-100 text-green-600 text-[10px] px-3 py-1 rounded-full font-black">Active</span>
                    </div>
                    <h4 class="text-2xl font-black mb-2 line-clamp-1">${escapeHTML(box.title)}</h4>
                    <p class="text-gray-400 font-bold text-sm mb-6 line-clamp-2">${escapeHTML(box.description || '')}</p>
                    <div class="mt-auto flex justify-between items-center border-t border-gray-50 pt-4">
                        <div class="flex items-center gap-2">
                            <div class="w-6 h-6 bg-blue-50 border border-blue-100 rounded-full flex items-center justify-center text-[10px]">👤</div>
                            <span class="text-[10px] font-black text-gray-400 italic">by ${escapeHTML(box.created_by)}</span>
                        </div>
                        <i class="fa-solid fa-arrow-right text-gray-200 group-hover:text-volloer-orange transition"></i>
                    </div>
                </div>
            `).join('');
        }

        function goToCreate() {
            if (!localStorage.getItem('v_user')) return alert("ログインしてくれ！");
            location.href = 'createbox.html';
        }

        function searchBoxes() {
            const q = document.getElementById('boxSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.box-card');
            cards.forEach(card => {
                const title = card.querySelector('h4').textContent.toLowerCase();
                card.style.display = title.includes(q) ? 'flex' : 'none';
            });
        }

        function escapeHTML(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }

        function logout() {
            if(confirm('ログアウトする？')){
                localStorage.removeItem('v_user');
                location.reload();
            }
        }
    </script>
</body>
</html>
