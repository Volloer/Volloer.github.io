        .box-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid #eee;
        }
        .box-card:hover {
            transform: scale(1.02);
            border-color: #ffab19;
            box-shadow: 0 15px 30px -10px rgba(255, 171, 25, 0.3);
        }
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-scratch-orange text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-6 py-3">
            <div class="flex items-center space-x-8">
                <h1 class="text-2xl font-black tracking-tight cursor-pointer" onclick="location.href='../index.html'">Volloer</h1>
                <div class="hidden md:flex space-x-6">
                    <a href="../index.html" class="hover:opacity-80 font-bold transition">ホーム</a>

            </div>

    <header class="bg-scratch-orange text-white py-16 px-6">

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div onclick="alert('近日公開予定！')" class="box-card bg-white p-8 rounded-[2.5rem] cursor-pointer group">
                <div class="flex justify-between items-start mb-6">
                    <div class="w-16 h-16 bg-orange-100 rounded-2xl flex items-center justify-center text-scratch-orange text-3xl">
                        <i class="fa-solid fa-gamepad"></i>
                    </div>
                    <span class="bg-green-100 text-green-600 text-[10px] px-3 py-1 rounded-full font-black">12人が参加中</span>

                <h4 class="text-2xl font-black mb-2">ゲーム制作部</h4>
                <p class="text-gray-400 font-bold text-sm mb-6">ScratchやUnityでゲームを作っている人、集まれ！</p>
                <div class="flex items-center gap-2">
                    <div class="flex -space-x-2">
                        <div class="w-6 h-6 rounded-full border-2 border-white bg-gray-200"></div>
                        <div class="w-6 h-6 rounded-full border-2 border-white bg-gray-300"></div>
                        <div class="w-6 h-6 rounded-full border-2 border-white bg-gray-400"></div>
                    </div>
                    <span class="text-[10px] font-black text-gray-300">Active Now</span>
                </div>
            </div>

            <div onclick="alert('近日公開予定！')" class="box-card bg-white p-8 rounded-[2.5rem] cursor-pointer group">
                <div class="flex justify-between items-start mb-6">
                    <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center text-scratch-blue text-3xl">
                        <i class="fa-solid fa-palette"></i>
                    </div>
                    <span class="bg-gray-100 text-gray-400 text-[10px] px-3 py-1 rounded-full font-black">準備中</span>
                </div>
                <h4 class="text-2xl font-black mb-2">イラスト・デザイン</h4>
                <p class="text-gray-400 font-bold text-sm mb-6">作品を見せ合ったり、アドバイスし合ったりする場所です。</p>
            </div>

            <div onclick="alert('ログインが必要です')" class="border-4 border-dashed border-gray-200 rounded-[2.5rem] flex flex-col items-center justify-center p-8 hover:bg-gray-100 transition-colors cursor-pointer text-gray-300 hover:text-scratch-orange">
                <i class="fa-solid fa-plus-circle text-5xl mb-4"></i>
                <span class="font-black text-xl">新しいBoXを作る</span>
            </div>

        </div>
    </main>

    <footer class="bg-white py-12 border-t-4 border-gray-100">
        <div class="container mx-auto px-6 text-center">
            <p class="font-black text-gray-200 uppercase tracking-[0.3em]">© 2026 Volloer BoX</p>
        </div>
    </footer>

                    </div>
                `;
            }
        });

        function logout() {
            if(confirm('ログアウトしますか？')) {
                localStorage.removeItem('v_user');
                location.reload();
            }
        }
