<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダッシュボード - Volloer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-scratch-blue { background-color: #4d97ff; }
        .text-scratch-blue { color: #4d97ff; }
        .bg-scratch-orange { background-color: #ffab19; }
        .bg-volloer-orange { background-color: #ffab19; }
        .v-btn { border-bottom: 4px solid rgba(0,0,0,0.2); transition: all 0.1s; }
        .v-btn:active { border-bottom-width: 0; transform: translateY(4px); }
        .icon-btn { transition: all 0.2s; border: 2px solid transparent; }
        .icon-btn:hover { transform: scale(1.1); background-color: #f0f7ff; }
        .icon-selected { border-color: #4d97ff !important; background-color: #f0f7ff !important; }
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-scratch-blue text-white shadow-md">
        <div class="container mx-auto flex justify-between items-center px-6 py-3">
            <h1 class="text-2xl font-black cursor-pointer" onclick="location.href='../index.html'">Volloer</h1>
            <div class="flex gap-4">
                <a href="../article/index.html" class="font-bold text-sm hover:underline">Article</a>
                <a href="../box/index.html" class="font-bold text-sm hover:underline">BoX</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto max-w-2xl px-6 py-12">
        <div class="bg-white rounded-[2rem] shadow-xl p-8 border-2 border-gray-100">
            <h2 class="text-3xl font-black mb-8 flex items-center gap-3">
                <i class="fa-solid fa-user-gear text-scratch-blue"></i> アカウント設定
            </h2>

            <div class="space-y-8">
                <div class="bg-blue-50 p-4 rounded-2xl border-2 border-blue-100">
                    <label class="block text-xs font-black text-scratch-blue mb-1 uppercase tracking-widest">Username</label>
                    <div id="display-username" class="text-xl font-black">読み込み中...</div>
                </div>

                <div class="text-center bg-gray-50 p-6 rounded-[2rem] border-2 border-dashed border-gray-200">
                    <h3 class="font-black text-gray-700 mb-4 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-face-smile text-scratch-blue"></i> マイアイコン
                    </h3>
                    <div id="user-icon-preview" class="w-20 h-20 bg-scratch-blue text-white rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-lg">👤</div>
                    <div id="icon-grid" class="grid grid-cols-5 gap-2 max-w-sm mx-auto"></div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border-2 border-gray-50">
                    <h3 class="font-black text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-bell text-scratch-orange text-xl"></i> 通知設定
                    </h3>
                    <div class="flex items-center justify-between bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <div>
                            <p class="font-black text-gray-700">メンション通知</p>
                            <p class="text-[10px] text-gray-400 font-bold leading-tight">自分宛のメッセージを光らせるぜ！<br>ONにするとブラウザから許可を求められるよ。</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="mention-toggle" class="sr-only peer">
                            <div class="w-14 h-7 bg-gray-400 peer-focus:outline-none rounded-full peer 
                                        peer-checked:bg-[#46c946] transition-all duration-300 relative
                                        after:content-[''] after:absolute after:top-[4px] after:left-[4px] 
                                        after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all 
                                        peer-checked:after:translate-x-7 shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)]">
                            </div>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-black text-gray-500 mb-2 ml-1">自己紹介 (100文字以内)</label>
                    <textarea id="bioInput" rows="3" maxlength="100"
                        class="w-full px-5 py-4 rounded-[1.5rem] border-2 border-gray-100 focus:border-scratch-blue outline-none font-medium transition bg-gray-50 shadow-inner"
                        placeholder="Scratchやってます！など"></textarea>
                    <p class="text-right text-xs text-gray-400 mt-2 font-bold"><span id="charCount">0</span> / 100</p>
                </div>

                <button onclick="saveProfile()" id="saveBtn"
                    class="w-full bg-scratch-orange v-btn text-white py-5 rounded-2xl font-black text-xl shadow-lg hover:brightness-105 active:scale-95">
                    プロフィールを保存
                </button>

                <hr class="border-gray-100">

                <button onclick="logout()" class="w-full text-gray-400 font-bold hover:text-red-500 transition text-sm">
                    ログアウトする
                </button>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let selectedEmoji = '👤';
        const emojis = ['👤', '🐱', '🐶', '🦊', '🐸', '🚀', '✨', '🔥', '🌈', '💎'];

        const iconGrid = document.getElementById('icon-grid');
        emojis.forEach(emoji => {
            const btn = document.createElement('button');
            btn.className = 'icon-btn p-2 bg-white rounded-xl text-2xl shadow-sm';
            btn.innerText = emoji;
            btn.onclick = () => updatePreview(emoji, btn);
            iconGrid.appendChild(btn);
        });

        function updatePreview(emoji, btn) {
            selectedEmoji = emoji;
            document.getElementById('user-icon-preview').innerText = emoji;
            document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('icon-selected'));
            if(btn) {
                btn.classList.add('icon-selected');
            } else {
                Array.from(document.querySelectorAll('.icon-btn')).forEach(b => {
                    if(b.innerText === emoji) b.classList.add('icon-selected');
                });
            }
        }

        async function requestNotificationPermission() {
            if (!("Notification" in window)) {
                alert("このブラウザは通知に対応してないみたいだぜ。");
                return false;
            }
            let permission = Notification.permission;
            if (permission === "default") {
                permission = await Notification.requestPermission();
            }
            return permission === "granted";
        }

        document.getElementById('mention-toggle').addEventListener('change', async (e) => {
            if (e.target.checked) {
                const granted = await requestNotificationPermission();
                if (!granted) {
                    alert("ブラウザの通知設定がブロックされてるぜ！アドレスバーの横の設定から許可してくれな。");
                    e.target.checked = false;
                }
            }
        });

        async function initDashboard() {
            const savedUser = localStorage.getItem('v_user');
            if (!savedUser) {
                location.href = 'login.html';
                return;
            }
            currentUser = JSON.parse(savedUser);
            document.getElementById('display-username').textContent = currentUser.username;

            const { data, error } = await supabaseClient
                .from('users')
                .select('bio, icon, mention_accepted')
                .eq('username', currentUser.username)
                .single();

            if (data) {
                if (data.bio) {
                    document.getElementById('bioInput').value = data.bio;
                    document.getElementById('charCount').textContent = data.bio.length;
                }
                if (data.icon) updatePreview(data.icon);
                document.getElementById('mention-toggle').checked = data.mention_accepted !== false;
            }
        }

        async function saveProfile() {
            const bio = document.getElementById('bioInput').value;
            const mentionAccepted = document.getElementById('mention-toggle').checked;
            const btn = document.getElementById('saveBtn');

            if (mentionAccepted && Notification.permission === "denied") {
                alert("スイッチはONにしたけど、ブラウザ側で通知がブロックされてるから届かないかもだぜ！");
            }

            btn.innerText = "保存中...";
            btn.disabled = true;

            const { error } = await supabaseClient
                .from('users')
                .update({ 
                    bio: bio,
                    icon: selectedEmoji,
                    mention_accepted: mentionAccepted
                })
                .eq('username', currentUser.username);

            if (error) {
                alert("エラーが発生したぜ: " + error.message);
            } else {
                currentUser.bio = bio;
                currentUser.icon = selectedEmoji;
                currentUser.mention_accepted = mentionAccepted;
                localStorage.setItem('v_user', JSON.stringify(currentUser));
                alert("設定をすべて更新したよ！");
            }

            btn.innerText = "プロフィールを保存";
            btn.disabled = false;
        }

        function logout() {
            if(confirm('ログアウトしてもいい？')) {
                localStorage.removeItem('v_user');
                location.href = '../index.html';
            }
        }

        document.getElementById('bioInput').addEventListener('input', (e) => {
            document.getElementById('charCount').textContent = e.target.value.length;
        });

        initDashboard();
    </script>
</body>
</html>
