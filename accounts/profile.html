<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール - Volloer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-scratch-blue { background-color: #4d97ff; }
        .text-scratch-blue { color: #4d97ff; }
        .bg-scratch-orange { background-color: #ffab19; }
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-scratch-blue text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-6 py-3">
            <h1 class="text-2xl font-black cursor-pointer" onclick="location.href='../index.html'">Volloer</h1>
            <div id="nav-auth-area" class="flex items-center space-x-4 text-sm font-bold">
                <a href="../index.html" class="hover:opacity-80">ホーム</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-12 max-w-4xl">
        <div class="bg-white rounded-[3rem] p-10 shadow-sm border border-gray-100 text-center mb-12">
            <div id="profile-avatar" class="w-24 h-24 bg-white border-4 border-scratch-orange rounded-full mx-auto mb-6 flex items-center justify-center text-5xl shadow-lg">?</div>
            
            <h2 id="profile-username" class="text-3xl font-black mb-2 text-gray-700">読み込み中...</h2>
            <p id="profile-bio" class="text-gray-500 font-medium mb-8 max-w-lg mx-auto whitespace-pre-wrap"></p>
            
            <div id="profile-action-area" class="flex justify-center gap-4 items-center"></div>
        </div>

        <div class="mb-8">
            <h3 class="text-xl font-black text-gray-600 flex items-center gap-2">
                <i class="fa-solid fa-book-open text-scratch-blue"></i> 投稿した記事
            </h3>
        </div>
        <div id="profile-post-list" class="grid md:grid-cols-2 gap-6"></div>
    </main>

    <script>
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let targetUser = ""; 
        let currentUser = JSON.parse(localStorage.getItem('v_user'));

        function getValidIcon(iconStr) {
            return (iconStr && [...iconStr].length === 1) ? iconStr : '👤';
        }

        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }

        async function initProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            targetUser = urlParams.get('u');
            
            if (!targetUser) { location.href = '../index.html'; return; }

            // 表示対象ユーザーの情報を取得
            const { data: userData, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('username', targetUser)
                .single();

            if (error || !userData) { 
                document.getElementById('profile-username').innerText = "ユーザーが見つかりません"; 
                return; 
            }

            // アイコンとユーザー情報の反映
            document.getElementById('profile-username').innerText = userData.username;
            document.getElementById('profile-avatar').innerText = getValidIcon(userData.icon);
            document.getElementById('profile-bio').innerText = userData.bio || "自己紹介はまだありません。";
            
            renderActionButtons();
            fetchUserPosts();
            updateNavbar(); // 自分のアイコン同期も含む
        }

        async function updateNavbar() {
            const navArea = document.getElementById('nav-auth-area');
            if (currentUser) {
                // 自分の最新アイコンを同期
                const { data } = await supabaseClient
                    .from('users')
                    .select('icon')
                    .eq('username', currentUser.username)
                    .single();
                
                if (data) {
                    currentUser.icon = data.icon;
                    localStorage.setItem('v_user', JSON.stringify(currentUser));
                }

                const myIcon = getValidIcon(currentUser.icon);
                navArea.innerHTML = `
                    <a href="../index.html" class="hover:opacity-80">ホーム</a>
                    <a href="profile.html?u=${encodeURIComponent(currentUser.username)}" 
                       class="w-8 h-8 bg-white text-scratch-blue rounded-full flex items-center justify-center border border-white/20 text-lg hover:scale-110 transition shadow-sm">
                       ${myIcon}
                    </a>
                `;
            }
        }

        async function renderActionButtons() {
            const area = document.getElementById('profile-action-area');
            
            if (currentUser && currentUser.username === targetUser) {
                area.innerHTML = `
                    <button onclick="location.href='dashboard.html'" class="bg-gray-100 text-gray-600 px-6 py-2 rounded-full font-black hover:bg-gray-200 transition text-sm">編集</button>
                    <button onclick="logout()" class="text-red-400 text-xs font-bold hover:underline ml-2">ログアウト</button>
                `;
                return;
            }

            if (currentUser) {
                const { data: followData } = await supabaseClient
                    .from('follows')
                    .select('*')
                    .eq('follower_name', currentUser.username)
                    .eq('following_name', targetUser)
                    .single();

                if (followData) {
                    area.innerHTML = `<button onclick="toggleFollow(true)" class="border-2 border-gray-200 text-gray-400 px-8 py-2 rounded-full font-black hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition group text-sm"><span class="group-hover:hidden">フォロー中</span><span class="hidden group-hover:inline">解除する</span></button>`;
                } else {
                    area.innerHTML = `<button onclick="toggleFollow(false)" class="bg-scratch-blue text-white px-8 py-2 rounded-full font-black shadow-lg hover:scale-105 transition text-sm"><i class="fa-solid fa-user-plus mr-1"></i> フォローする</button>`;
                }
            } else {
                area.innerHTML = `<p class="text-xs text-gray-400">フォローするにはログインが必要です</p>`;
            }
        }

        async function toggleFollow(isFollowing) {
            if (!currentUser) return;
            if (isFollowing) {
                await supabaseClient.from('follows').delete().eq('follower_name', currentUser.username).eq('following_name', targetUser);
            } else {
                await supabaseClient.from('follows').insert({ follower_name: currentUser.username, following_name: targetUser });
            }
            renderActionButtons();
        }

        async function fetchUserPosts() {
            const listArea = document.getElementById('profile-post-list');
            const { data } = await supabaseClient.from('posts').select('*').eq('author', targetUser).order('created_at', { ascending: false });
            
            if (!data || data.length === 0) { 
                listArea.innerHTML = `<div class="col-span-full text-center py-10 text-gray-300 font-bold">記事はまだありません</div>`; 
                return; 
            }

            listArea.innerHTML = data.map(post => `
                <div onclick="location.href='../Article/view.html?id=${post.id}'" class="bg-white p-6 rounded-[2rem] border-2 border-gray-50 shadow-sm hover:shadow-md hover:border-scratch-blue transition-all cursor-pointer transform hover:-translate-y-1">
                    <h4 class="font-black mb-2 line-clamp-1 text-gray-700">${escapeHTML(post.title)}</h4>
                    <p class="text-gray-400 text-xs line-clamp-2 font-medium">${escapeHTML(post.content)}</p>
                    <div class="mt-4 flex justify-end text-[10px] text-gray-300 font-bold">
                        <i class="fa-solid fa-thumbs-up mr-1 text-scratch-orange"></i> ${post.good_count || 0}
                    </div>
                </div>
            `).join('');
        }

        function logout() { 
            if(confirm('ログアウトしてもよろしいですか？')) { 
                localStorage.removeItem('v_user'); 
                location.href = '../index.html'; 
            } 
        }

        initProfile();
    </script>
</body>
</html>
