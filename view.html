<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事詳細 - Volloer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <nav class="bg-[#4d97ff] text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black cursor-pointer" onclick="location.href='index.html'">Volloer</h1>
            <a href="index.html" class="text-sm font-bold bg-white/20 px-4 py-2 rounded-full">戻る</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10 max-w-3xl">
        <article id="article-content" class="bg-white rounded-3xl p-8 shadow-sm border border-gray-200 min-h-[50vh]">
            <div class="animate-pulse">読み込み中...</div>
        </article>
    </main>

    <script>
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadArticle() {
            // URLの「?id=xxx」からIDを取得する
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            if (!articleId) {
                location.href = 'index.html';
                return;
            }

            const { data, error } = await supabaseClient
                .from('posts')
                .select('*')
                .eq('id', articleId)
                .single(); // 1件だけ取得

            if (error || !data) {
                document.getElementById('article-content').innerHTML = "記事が見つかりませんでした。";
                return;
            }

            // 画面に表示
            document.getElementById('article-content').innerHTML = `
                <h1 class="text-3xl font-black mb-4">${data.title}</h1>
                <div class="flex items-center gap-2 mb-8 text-gray-400 text-sm font-bold">
                    <span><i class="fa-solid fa-user"></i> ${data.author}</span>
                    <span>•</span>
                    <span>${new Date(data.created_at).toLocaleDateString()}</span>
                </div>
                <div class="prose max-w-none text-gray-700 leading-relaxed whitespace-pre-wrap">${data.content}</div>
                <div class="mt-12 pt-8 border-t flex gap-4">
                    <button class="bg-gray-100 px-6 py-2 rounded-full font-bold">👍 ${data.good_count || 0}</button>
                    <button class="bg-gray-100 px-6 py-2 rounded-full font-bold">👎 ${data.bad_count || 0}</button>
                </div>
            `;
        }

        loadArticle();
    </script>
</body>
</html>
