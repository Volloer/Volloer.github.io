<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事詳細 - Volloer</title>
    <link rel="icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <nav class="bg-[#4d97ff] text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-xl font-black cursor-pointer" onclick="location.href='index.html'">Volloer</h1>
            <a href="index.html" class="text-sm font-bold bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full transition">戻る</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10 max-w-3xl">
        <article id="article-content" class="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-sm border border-gray-100 min-h-[50vh]">
            <div class="animate-pulse flex flex-col gap-4">
                <div class="h-10 bg-gray-200 rounded-full w-3/4"></div>
                <div class="h-4 bg-gray-200 rounded-full w-1/4"></div>
            </div>
        </article>
    </main>

    <script>
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        
        // ★重要: キャッシュを強制的にリフレッシュするためのオプションを追加
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            db: { schema: 'public' }
        });

        let currentArticleId = null;

        async function loadArticle() {
            const urlParams = new URLSearchParams(window.location.search);
            currentArticleId = urlParams.get('id');

            if (!currentArticleId) {
                location.href = 'index.html';
                return;
            }

            const { data, error } = await supabaseClient
                .from('posts')
                .select('*')
                .eq('id', currentArticleId)
                .single();

            if (error || !data) {
                document.getElementById('article-content').innerHTML = `<div class="text-center py-20"><p class="text-gray-400 font-bold">記事が見つかりませんでした。</p></div>`;
                return;
            }

            const container = document.getElementById('article-content');
            container.innerHTML = `
                <h1 class="text-3xl md:text-4xl font-black mb-6 leading-tight">${data.title}</h1>
                <div class="flex items-center gap-3 mb-10 text-gray-400 text-sm font-bold border-b border-gray-50 pb-6">
                    <div class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center font-black">${data.author.charAt(0).toUpperCase()}</div>
                    <span>${data.author}</span>
                    <span>•</span>
                    <span>${new Date(data.created_at).toLocaleDateString()}</span>
                </div>
                <div class="prose max-w-none text-gray-700 leading-relaxed whitespace-pre-wrap text-lg mb-16">${data.content}</div>
                <div class="pt-8 border-t flex gap-4">
                    <button onclick="updateVote('good')" id="btn-good" class="flex items-center gap-2 bg-orange-50 text-[#ffab19] px-8 py-3 rounded-full font-black hover:scale-105 transition shadow-sm border border-orange-100">
                        <i class="fa-solid fa-thumbs-up"></i> <span id="good-count">${data.good_count || 0}</span>
                    </button>
                    <button onclick="updateVote('bad')" id="btn-bad" class="flex items-center gap-2 bg-gray-50 text-gray-400 px-8 py-3 rounded-full font-black hover:scale-105 transition border border-gray-100">
                        <i class="fa-solid fa-thumbs-down"></i> <span id="bad-count">${data.bad_count || 0}</span>
                    </button>
                </div>
            `;
        }

        async function updateVote(type) {
            const savedUser = localStorage.getItem('v_user');
            if (!savedUser) {
                alert("評価するにはログインが必要です。");
                return;
            }
            const user = JSON.parse(savedUser);

            // 1. votesテーブルに記録
            const { error: voteError } = await supabaseClient
                .from('votes')
                .insert([{ 
                    post_id: currentArticleId, 
                    username: user.username, 
                    vote_type: type 
                }]);

            if (voteError) {
                if (voteError.code === '23505') {
                    alert("この記事には既に評価済みです（一発勝負！）。");
                } else if (voteError.message.includes("schema cache")) {
                    alert("サーバーが準備中です。10秒ほど待ってからもう一度お試しください。");
                } else {
                    alert("エラー: " + voteError.message);
                    console.error("詳細:", voteError);
                }
                return;
            }

            // 2. postsテーブルの数値を+1する
            const field = type === 'good' ? 'good_count' : 'bad_count';
            const countEl = document.getElementById(`${type}-count`);
            const currentCount = parseInt(countEl.innerText);

            const { error: updateError } = await supabaseClient
                .from('posts')
                .update({ [field]: currentCount + 1 })
                .eq('id', currentArticleId);

            if (!updateError) {
                countEl.innerText = currentCount + 1;
                alert(type === 'good' ? "Goodしました！" : "Badを付けました。");
            } else {
                alert("データの更新に失敗しました。");
                console.error(updateError);
            }
        }

        loadArticle();
    </script>
</body>
</html>
