<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール - Volloer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-scratch-blue { background-color: #4d97ff; }
        .text-scratch-blue { color: #4d97ff; }
        .bg-scratch-orange { background-color: #ffab19; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-scratch-blue text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-6 py-3">
            <h1 class="text-2xl font-black cursor-pointer" onclick="location.href='index.html'">Volloer</h1>
            <div id="nav-auth-area" class="flex items-center space-x-4 text-sm font-bold">
                <a href="index.html" class="hover:opacity-80">ホーム</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-12 max-w-4xl">
        <div class="bg-white rounded-[3rem] p-10 shadow-sm border border-gray-100 text-center mb-12">
            <div id="profile-avatar" class="w-24 h-24 bg-scratch-orange rounded-full mx-auto mb-6 flex items-center justify-center text-4xl font-black text-white shadow-lg">
                ?
            </div>
            <h2 id="profile-username" class="text-3xl font-black mb-2 text-gray-700">読み込み中...</h2>
            <p id="profile-bio" class="text-gray-500 font-medium mb-8 max-w-lg mx-auto whitespace-pre-wrap"></p>
            
            <div id="profile-action-area" class="flex justify-center gap-4"></div>
        </div>

        <div class="mb-8">
            <h3 class="text-xl font-black text-gray-600 flex items-center gap-2">
                <i class="fa-solid fa-book-open text-scratch-blue"></i>
                <span id="post-list-title">投稿した記事</span>
            </h3>
        </div>

        <div id="profile-post-list" class="grid md:grid-cols-2 gap-6">
            <div class="col-span-full text-center py-20 text-gray-400 font-bold">記事を読み込んでいます...</div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- XSS対策用のエスケープ関数 ---
        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/[&<>"']/g, function(m) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[m];
            });
        }

        async function initProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetUsername = urlParams.get('u');
            if (!targetUsername) { location.href = 'index.html'; return; }

            const savedUser = localStorage.getItem('v_user');
            const currentUser = savedUser ? JSON.parse(savedUser) : null;

            // ユーザー情報（bio含む）を取得
            const { data: userData, error: userError } = await supabaseClient
                .from('users')
                .select('*')
                .eq('username', targetUsername)
                .single();

            if (userError || !userData) {
                document.getElementById('profile-username').innerText = "ユーザーが見つかりません";
                return;
            }

            // 表示の更新（textContent/innerTextを使うことでXSSを防ぐ）
            document.getElementById('profile-username').innerText = userData.username;
            document.getElementById('profile-avatar').innerText = userData.username.charAt(0).toUpperCase();
            document.getElementById('profile-bio').innerText = userData.bio || "自己紹介はまだありません。";
            document.title = `${userData.username} のプロフィール - Volloer`;

            if (currentUser && currentUser.username === userData.username) {
                document.getElementById('profile-action-area').innerHTML = `
                    <button onclick="location.href='dashboard.html'" class="bg-gray-100 text-gray-600 px-6 py-3 rounded-full font-black hover:bg-gray-200 transition flex items-center gap-2">
                        <i class="fa-solid fa-gauge-high"></i> ダッシュボード
                    </button>
                    <button onclick="logout()" class="text-red-400 text-sm font-bold hover:underline ml-4">ログアウト</button>
                `;
            }

            fetchUserPosts(targetUsername);
            updateNavbar(currentUser);
        }

        async function fetchUserPosts(username) {
            const listArea = document.getElementById('profile-post-list');
            const { data, error } = await supabaseClient
                .from('posts')
                .select('*')
                .eq('author', username)
                .order('created_at', { ascending: false });

            if (error || data.length === 0) {
                listArea.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400 font-bold">まだ記事を投稿していません。</div>`;
                return;
            }

            // HTML生成時に escapeHTML を使って記事内容を守る
            listArea.innerHTML = data.map(post => `
                <div onclick="location.href='view.html?id=${post.id}'" 
                     class="bg-white p-6 rounded-[2rem] border-2 border-gray-100 shadow-sm hover:shadow-md hover:border-scratch-blue transition-all cursor-pointer group">
                    <h4 class="text-lg font-black mb-2 group-hover:text-scratch-blue transition-colors line-clamp-2">${escapeHTML(post.title)}</h4>
                    <p class="text-gray-500 text-xs line-clamp-2 mb-4">${escapeHTML(post.content)}</p>
                    <div class="flex justify-between items-center text-[10px] font-black text-gray-400 uppercase tracking-widest">
                        <span><i class="fa-regular fa-calendar mr-1"></i> ${new Date(post.created_at).toLocaleDateString()}</span>
                        <span><i class="fa-solid fa-thumbs-up text-scratch-orange mr-1"></i> ${post.good_count || 0}</span>
                    </div>
                </div>
            `).join('');
        }

        function updateNavbar(user) {
            const navArea = document.getElementById('nav-auth-area');
            if (user) {
                navArea.innerHTML = `
                    <a href="index.html" class="hover:opacity-80">ホーム</a>
                    <a href="post.html" class="hover:opacity-80">記事を書く</a>
                    <a href="profile.html?u=${encodeURIComponent(user.username)}" class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center border border-white/20">
                        ${user.username.charAt(0).toUpperCase()}
                    </a>
                `;
            } else {
                navArea.innerHTML = `<a href="login.html" class="bg-white text-scratch-blue px-4 py-1.5 rounded-full">ログイン</a>`;
            }
        }

        function logout() {
            if(confirm('ログアウトしますか？')) {
                localStorage.removeItem('v_user');
                location.href = 'index.html';
            }
        }

        initProfile();
    </script>
</body>
</html>
