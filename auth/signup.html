<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規登録 - Volloer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-8 bg-gray-800 rounded-2xl shadow-2xl border border-gray-700">
        <h1 class="text-3xl font-bold mb-6 text-center text-indigo-400">アカウント作成</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">メールアドレス</label>
                <input type="email" id="email" class="w-full p-3 bg-gray-900 border border-gray-700 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">パスワード</label>
                <input type="password" id="password" class="w-full p-3 bg-gray-900 border border-gray-700 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="6文字以上">
            </div>
            
            <button onclick="goToVerify()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition duration-200 mt-4">
                登録する
            </button>
        </div>

        <p id="message" class="mt-4 text-center text-sm text-red-500"></p>
        
        <div class="mt-6 text-center text-gray-400 text-sm">
            <a href="login.html" class="hover:text-indigo-400">すでにアカウントをお持ちの方</a>
        </div>
    </div>

    // --- signup.html 内の <script> 部分 ---
const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function goToVerify() {
    // IDを「email」から「username」に変えて取得
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const message = document.getElementById('message');

    if (username.length < 3) {
        message.innerText = "ユーザー名は3文字以上で入力してください。";
        return;
    }
    if (password.length < 6) {
        message.innerText = "パスワードは6文字以上必要です。";
        return;
    }

    // Base64でエンコードしてverify.htmlへ飛ばす
    // u = username, p = password
    const uEncoded = btoa(encodeURIComponent(username));
    const pEncoded = btoa(encodeURIComponent(password));

    window.location.href = `verify.html?u=${uEncoded}&p=${pEncoded}`;
}
</body>
</html>
