<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Volloer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700">
        <h2 class="text-2xl font-bold mb-6 text-center text-green-400">Create Account</h2>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Email" class="w-full bg-gray-700 border border-gray-600 p-2.5 rounded text-white outline-none focus:ring-2 focus:ring-green-500">
            <input type="password" id="password" placeholder="Password" class="w-full bg-gray-700 border border-gray-600 p-2.5 rounded text-white outline-none focus:ring-2 focus:ring-green-500">
            <button onclick="signUp()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded transition">
                新規登録
            </button>
        </div>
        <p class="mt-6 text-center text-sm">
            既にアカウントをお持ちですか？ <a href="login.html" class="text-indigo-400 hover:underline">ログイン</a>
        </p>
        <p id="message" class="mt-4 text-center text-sm"></p>
    </div>

    <script>
        // ※SUPABASE_URLとKEYを忘れずに記入
    const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');
            
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) {
                message.innerText = "Error: " + error.message;
                message.className = "mt-4 text-red-500";
            } else {
                message.innerText = "確認メールを送信しました！";
                message.className = "mt-4 text-green-400";
            }
        }
    </script>
</body>
</html>
