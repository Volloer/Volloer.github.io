<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Volloer - ホーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 p-6">
    <nav class="max-w-4xl mx-auto flex justify-between items-center mb-10">
        <h1 class="text-3xl font-bold text-indigo-600">Volloer</h1>
        <a href="post.html" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold hover:bg-indigo-700 transition">投稿を作る</a>
    </nav>

    <main class="max-w-4xl mx-auto">
        <div id="postsContainer" class="grid gap-6"></div>
    </main>

    <script>
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadPosts() {
            const { data, error } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('postsContainer');
            if (error) { container.innerText = "エラー: " + error.message; return; }
            
            container.innerHTML = data.map(p => `
                <div class="bg-white p-6 rounded-xl shadow-sm border">
                    <h3 class="text-xl font-bold mb-2">${p.title}</h3>
                    <p class="text-indigo-500 text-sm mb-3">${p.tags ? p.tags : ''}</p>
                    <p class="text-gray-700">${p.content}</p>
                </div>
            `).join('');
        }
        loadPosts();
    </script>
</body>
</html>
