<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Volloer - ホーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-10">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600">Volloer</h1>
            <div class="space-x-6 flex items-center">
                <a href="index.html" class="text-gray-600 hover:text-indigo-600 font-medium">Home</a>
                <a href="login.html" class="text-gray-600 hover:text-indigo-600 font-medium">Login</a>
                <a href="signup.html" class="text-gray-600 hover:text-indigo-600 font-medium">Sign Up</a>
                <a href="post.html" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition font-bold">投稿する</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 px-4 max-w-4xl">
        <h2 class="text-xl font-bold mb-6 border-l-4 border-indigo-600 pl-3">最新のとうこう</h2>
        
        <div id="postsContainer" class="grid gap-6 text-center py-10">
            <p class="text-gray-500">読み込み中...</p>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchPosts() {
            const container = document.getElementById('postsContainer');
            
            const { data, error } = await supabaseClient
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = `<p class="text-red-500">エラー: ${error.message}</p>`;
                return;
            }

            if (data.length === 0) {
                container.innerHTML = `<p class="text-gray-500">まだ投稿がありません。</p>`;
                return;
            }

            // 投稿を表示
            container.innerHTML = data.map(post => `
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition text-left">
                    <h3 class="text-xl font-bold mb-2">${post.title}</h3>
                    <div class="flex flex-wrap gap-2 mb-3">
                        ${post.tags ? post.tags.split(',').map(tag => `<span class="bg-indigo-50 text-indigo-600 text-xs font-bold px-2 py-1 rounded">#${tag.trim()}</span>`).join('') : ''}
                    </div>
                    <p class="text-gray-700 whitespace-pre-wrap">${post.content}</p>
                    <div class="mt-4 text-xs text-gray-400">
                        ${new Date(post.created_at).toLocaleString()}
                    </div>
                </div>
            `).join('');
        }

        fetchPosts();
    </script>
</body>
</html>
