<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volloer - 記事の共有と評価のコミュニティ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-scratch-blue { background-color: #4d97ff; }
        .text-scratch-blue { color: #4d97ff; }
        .bg-scratch-orange { background-color: #ffab19; }
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        .welcome-fade { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-scratch-blue text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-6 py-3">
            <div class="flex items-center space-x-8">
                <h1 class="text-2xl font-black tracking-tight cursor-pointer" onclick="location.href='index.html'">Volloer</h1>
                <div class="hidden md:flex space-x-6">
                    <a href="index.html" class="hover:opacity-80 font-bold transition">ホーム</a>
                    <a href="post.html" id="write-nav" class="hover:opacity-80 font-bold transition">記事を書く</a>
                </div>
            </div>
            <div id="auth-area" class="flex items-center space-x-4">
                <a href="login.html" class="font-bold text-sm">ログイン</a>
                <a href="signup.html" class="bg-scratch-orange hover:brightness-110 text-white px-5 py-2 rounded-full font-black shadow-sm transition text-sm">今すぐ参加</a>
            </div>
        </div>
    </nav>

    <header id="hero-section" class="bg-scratch-blue text-white py-20 border-b border-black/10 transition-all">
        <div class="container mx-auto px-6 text-center">
            <h2 id="hero-title" class="text-4xl md:text-6xl font-black mb-6 tracking-tight">あなたの知識を、<br class="md:hidden">価値ある評価へ。</h2>
            <p id="hero-desc" class="text-xl md:text-2xl opacity-90 max-w-2xl mx-auto mb-10 leading-relaxed">
                Volloerは、誰でも自由に記事を投稿し、読者のリアルな反応を受け取れる場所です。
            </p>
            <div id="hero-action" class="flex justify-center space-x-4">
                <a href="signup.html" class="bg-white text-scratch-blue px-10 py-4 rounded-full font-black text-lg shadow-xl hover:scale-105 transition">アカウント作成（無料）</a>
            </div>

            <div class="max-w-xl mx-auto mt-12 relative px-4">
                <input type="text" id="searchInput" onkeyup="if(event.key==='Enter') searchArticles()"
                    class="w-full px-6 py-4 rounded-full border-none shadow-2xl text-gray-700 focus:ring-4 focus:ring-scratch-orange outline-none font-bold" 
                    placeholder="気になる記事を検索...">
                <button onclick="searchArticles()" class="absolute right-6 top-2 bg-scratch-orange text-white p-2 rounded-full w-10 h-10 hover:scale-110 transition shadow-lg">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </div>
    </header>

    <main id="main-content" class="container mx-auto px-6 py-20">
        <div id="article-section" class="mb-24">
            <div class="flex justify-between items-end mb-8">
                <h3 class="text-3xl font-black flex items-center gap-3 text-gray-700">
                    <i class="fa-solid fa-bolt text-scratch-orange"></i> 最新の投稿
                </h3>
            </div>
            
            <div id="post-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full text-center py-10 text-gray-400 font-bold animate-pulse">
                    記事を読み込み中...
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-100 border-t border-gray-200 py-12">
        <div class="container mx-auto px-6 text-center text-gray-400">
            <p class="text-xs font-medium">© 2026 Volloer Project. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        const SUPABASE_URL = 'https://xlvmfodeheufqjmevktq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhsdm1mb2RlaGV1ZnFqbWV2a3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQyNDQsImV4cCI6MjA5MTIyMDI0NH0.Mjb5o4cvEY_ygu5xludZuTeTP6ftiW_qeAZFIHrHp40';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // XSS対策用：HTMLエスケープ
        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/[&<>"']/g, m => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[m]));
        }

        document.addEventListener('DOMContentLoaded', () => {
            const authArea = document.getElementById('auth-area');
            const savedUser = localStorage.getItem('v_user');

            if (savedUser) {
                const user = JSON.parse(savedUser);
                authArea.innerHTML = `
                    <div class="flex items-center space-x-3 bg-white/10 pl-1 pr-3 py-1 rounded-full border border-white/20 welcome-fade">
                        <div onclick="location.href='dashboard.html'" class="w-8 h-8 bg-scratch-orange rounded-full flex items-center justify-center font-black text-white text-xs shadow-inner cursor-pointer hover:scale-110 transition">
                            ${user.username.charAt(0).toUpperCase()}
                        </div>
                        <span onclick="location.href='dashboard.html'" class="font-black text-sm cursor-pointer hover:underline">${user.username}</span>
                        <button onclick="logout()" class="text-[10px] bg-black/10 hover:bg-black/20 px-2 py-1 rounded transition ml-2">ログアウト</button>
                    </div>
                `;
            }
            fetchPosts();
        });

        async function fetchPosts() {
            const listArea = document.getElementById('post-list');
            const { data, error } = await supabaseClient
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(6); 

            if (error || !data) {
                listArea.innerHTML = `<p class="col-span-full text-center text-red-400">記事の読み込みに失敗しました。</p>`;
                return;
            }

            listArea.innerHTML = data.map(post => {
                const safeTitle = escapeHTML(post.title);
                const safeContent = escapeHTML(post.content);
                const safeAuthor = escapeHTML(post.author);
                const profileUrl = `profile.html?u=${encodeURIComponent(post.author)}`;

                return `
                <div onclick="location.href='view.html?id=${post.id}'" 
                     class="bg-white p-6 rounded-[2rem] border-2 border-gray-100 shadow-sm hover:shadow-xl hover:border-scratch-blue transition-all cursor-pointer group transform hover:-translate-y-1">
                    <h4 class="text-xl font-black mb-2 group-hover:text-scratch-blue transition-colors line-clamp-2">${safeTitle}</h4>
                    <p class="text-gray-500 text-sm line-clamp-3 mb-6 font-medium">${safeContent}</p>
                    <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                        <div onclick="event.stopPropagation(); location.href='${profileUrl}'" class="flex items-center gap-2 group/author">
                            <div class="w-6 h-6 bg-gray-100 group-hover/author:bg-scratch-blue group-hover/author:text-white transition rounded-full flex items-center justify-center text-[10px] font-black">
                                ${safeAuthor.charAt(0).toUpperCase()}
                            </div>
                            <span class="text-xs font-bold text-gray-400 group-hover/author:text-scratch-blue group-hover/author:underline">${safeAuthor || '不明'}</span>
                        </div>
                        <div class="flex items-center gap-3 text-gray-400 font-black text-xs">
                            <span><i class="fa-solid fa-thumbs-up text-scratch-orange mr-1"></i> ${post.good_count || 0}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function searchArticles() {
            const q = document.getElementById('searchInput').value;
            if (q.trim()) location.href = `search.html?q=${encodeURIComponent(q)}`;
        }

        function logout() {
            if(confirm('ログアウトしますか？')) {
                localStorage.removeItem('v_user');
                location.reload();
            }
        }
    </script>
</body>
</html>
